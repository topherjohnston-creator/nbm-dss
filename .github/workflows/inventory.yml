name: NBM QMD Inventory

on:
  workflow_dispatch:

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run QMD inventory
        run: |
          python scripts/nbm_inventory.py

      - name: Commit inventory output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add data/nbm_inventory.json
          git diff --staged --quiet || git commit -m "Update QMD field inventory [skip ci]"
          git push
