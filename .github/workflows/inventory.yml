name: NBM Inventory

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install herbie-data cfgrib xarray numpy pandas eccodes

      - name: Run NBM inventory
        run: |
          python scripts/nbm_inventory.py

      - name: Commit inventory output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/nbm_inventory.json
          git diff --staged --quiet || git commit -m "Update NBM inventory [skip ci]"
          git push
